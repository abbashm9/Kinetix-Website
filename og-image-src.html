<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 630px; overflow: hidden; }
body {
  background: #0C0E14;
  font-family: 'Syne', sans-serif;
  position: relative;
}

/* Grid */
.grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 30%, transparent 100%);
}

/* Orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
}
.orb-1 { width: 560px; height: 560px; top: -160px; right: -80px;
  background: radial-gradient(circle, rgba(90,154,171,0.22) 0%, transparent 70%); }
.orb-2 { width: 420px; height: 420px; bottom: -120px; left: 40px;
  background: radial-gradient(circle, rgba(197,232,138,0.14) 0%, transparent 70%); }
.orb-3 { width: 200px; height: 200px; top: 200px; left: 560px;
  background: radial-gradient(circle, rgba(197,232,138,0.07) 0%, transparent 70%); }

/* Main layout */
.inner {
  position: absolute; inset: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 88px;
  z-index: 2;
}

/* Left side */
.left { flex: 1; padding-right: 60px; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px 7px 10px;
  background: rgba(197,232,138,0.08);
  border: 1px solid rgba(197,232,138,0.22);
  border-radius: 100px;
  margin-bottom: 32px;
}
.badge-dot { width: 7px; height: 7px; background: #C5E88A; border-radius: 50%; }
.badge-text {
  font-size: 11px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(197,232,138,0.75);
  font-family: 'Syne', sans-serif;
}

.headline {
  font-size: 78px; font-weight: 800;
  line-height: 0.92; letter-spacing: -0.04em;
  color: #fff;
  margin-bottom: 28px;
}
.headline .accent { color: #C5E88A; }

.sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 17px; font-weight: 300;
  color: rgba(255,255,255,0.38);
  line-height: 1.65;
}

/* Bottom-left URL */
.url {
  position: absolute;
  bottom: 44px; left: 88px;
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 600;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.22);
  z-index: 3;
}
.url span { color: rgba(197,232,138,0.4); }

/* Right side — logo block */
.logo-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}
.k-wrap {
  width: 148px; height: 148px;
  border-radius: 32px;
  background: rgba(197,232,138,0.06);
  border: 1px solid rgba(197,232,138,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 60px rgba(197,232,138,0.08);
}
.wordmark {
  font-family: 'Syne', sans-serif;
  font-size: 26px; font-weight: 800;
  color: #fff; letter-spacing: -0.5px;
}
.wordmark span { color: #C5E88A; }

/* Decorative line */
.deco-line {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, rgba(197,232,138,0.3) 30%, rgba(90,154,171,0.3) 70%, transparent 100%);
  z-index: 3;
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="inner">
  <div class="left">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Kuwait's Digital Agency</span>
    </div>
    <div class="headline">
      We Set<br>
      Brands<br>
      <span class="accent">In Motion.</span>
    </div>
    <div class="sub">
      Brand strategy, campaigns &amp; identities<br>
      built to accelerate growth — in Arabic &amp; English.
    </div>
  </div>

  <div class="logo-block">
    <div class="k-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="82" height="82" viewBox="0 0 100 100">
        <rect width="100" height="100" rx="18" fill="#0C0E14"/>
        <rect x="18" y="14" width="18" height="72" rx="3" fill="#FFFFFF"/>
        <path d="M36 50 L70 14 L82 14 Q72 32 55 50 Q72 68 82 86 L70 86 L36 50Z" fill="#FFFFFF"/>
      </svg>
    </div>
    <div class="wordmark">K<span>INETIX</span></div>
  </div>
</div>

<div class="url">kinetix<span>kw.com</span></div>
<div class="deco-line"></div>
</body>
</html>
